name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[test]"
      - name: Run pytest
        run: pytest -q
      - name: Run example entrypoint
        run: python main.py
      - name: Run MVP verifier
        run: python scripts/verify_mvp.py
      - name: Verify Codex review packet
        run: python scripts/verify_codex_review_packet.py --packet docs/reviews/PHASE_2A6_RP_REVIEW_PACKET.md
